name: sync-kanban-docs

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync GitHub Project snapshot to docs
        env:
          GH_TOKEN: ${{ secrets.KANBAN_SYNC_TOKEN || github.token }}
          GH_PROJECT_OWNER: ${{ vars.GH_PROJECT_OWNER }}
          GH_PROJECT_NUMBER: ${{ vars.GH_PROJECT_NUMBER }}
          GH_PROJECT_URL: https://github.com/users/cunha-luiss/projects/2
          OUTPUT_FILE: docs/kanban-sync.md
        run: python .github/scripts/sync_project_to_docs.py

      - name: Commit changes if needed
        run: |
          if git diff --quiet -- docs/kanban-sync.md; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/kanban-sync.md
          git commit -m "docs(kanban): atualiza snapshot do GitHub Project"
          git push
